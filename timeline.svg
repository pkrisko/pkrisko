<svg width="14" height="96" viewBox="0 0 14 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- vertical line -->
  <line x1="7" y1="10" x2="7" y2="86" stroke="url(#lg)" stroke-width="1.5"/>
  <!-- dots -->
  <circle cx="7" cy="16" r="5" fill="#3fb950" filter="url(#glow-green)"/>
  <circle cx="7" cy="48" r="5" fill="#58a6ff" filter="url(#glow-blue)"/>
  <circle cx="7" cy="80" r="4" fill="#8b949e"/>
</svg>
